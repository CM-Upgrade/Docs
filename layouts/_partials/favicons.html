{{- /*
  Override of Hextra's `favicons.html` partial.

  Hextra ships a full favicon set (favicon.svg, favicon-16x16.png, etc.)
  inside its theme `static/` directory. We emit a link tag only for the
  favicon file we actually ship in the project static, so nothing falls
  back to the theme defaults.
*/ -}}
<link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon" sizes="48x48" />
<link rel="icon shortcut" href="{{ "favicon.ico" | relURL }}" sizes="48x48" />
